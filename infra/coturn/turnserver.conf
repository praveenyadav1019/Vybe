# ── VYBEON coturn (WebRTC TURN/STUN) ────────────────────────────────────────
# Self-hosted relay for react-native-webrtc. Credentials are issued by the API
# (apps/api/src/lib/ice.ts) using the shared secret below — no per-user accounts.
#
# Values marked {OVERRIDE} are supplied on the command line by docker-compose
# (--static-auth-secret / --realm / --external-ip). Override them there, not here.

# Listening ports (UDP + TCP)
listening-port=3478
tls-listening-port=5349

# Relay UDP port range — MUST match the security group rule exactly.
# Each concurrent relayed call consumes ports from this range, so keep it wide.
min-port=49152
max-port=65535

# ── Authentication ──────────────────────────────────────────────────────────
# Long-term credential REST mechanism: the API signs time-limited
# username/credential pairs with this secret; coturn validates the HMAC.
use-auth-secret
# static-auth-secret is injected via the compose command (--static-auth-secret).
realm=vybeon

# ── TLS (turns://) ──────────────────────────────────────────────────────────
# Uncomment and mount certs to enable TURN over TLS on 5349 (set
# TURN_TLS_ENABLED=true for the API too). Lets calls traverse firewalls that
# only permit 443/TLS traffic.
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# ── Hardening ────────────────────────────────────────────────────────────────
fingerprint
no-multicast-peers
no-cli
# Block relaying to private/loopback ranges (SSRF protection).
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=0.0.0.0-0.255.255.255

# Reasonable per-session quotas.
user-quota=12
total-quota=1200
stale-nonce=600

# Logging
log-file=stdout
simple-log
verbose
