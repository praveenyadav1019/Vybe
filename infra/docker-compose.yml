version: "3.9"

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  vybeon-network:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Services ──────────────────────────────────────────────────────────────────
services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vybeon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vybeon
      POSTGRES_USER: vybeon
      POSTGRES_PASSWORD: vybeon
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vybeon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vybeon -d vybeon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vybeon_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - vybeon-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: vybeon_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://vybeon:vybeon@postgres:5432/vybeon?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-!!!}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      LOCATION_TTL_SECONDS: 300
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      AGORA_APP_ID: ${AGORA_APP_ID:-}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-}
      STORAGE_CDN_URL: ${STORAGE_CDN_URL:-https://cdn.vybeon.com}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vybeon-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vybeon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certs when available:
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vybeon-network
