version: "3.9"

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  vybeon-network:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Services ──────────────────────────────────────────────────────────────────
services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vybeon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vybeon
      POSTGRES_USER: vybeon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vybeon}
      PGDATA: /var/lib/postgresql/data/pgdata
    # Bound to loopback only: the API reaches Postgres over the compose network
    # (postgres:5432). Never expose the DB on the public interface.
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vybeon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vybeon -d vybeon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vybeon_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    # Loopback only — reached as redis:6379 over the compose network.
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - vybeon-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: vybeon_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://vybeon:${POSTGRES_PASSWORD:-vybeon}@postgres:5432/vybeon?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-!!!}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      LOCATION_TTL_SECONDS: 300
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # WebRTC TURN/STUN (self-hosted coturn). TURN_HOST must be the PUBLIC IP
      # or domain reachable by clients — not the docker service name.
      TURN_HOST: ${TURN_HOST:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_REALM: ${TURN_REALM:-vybeon}
      TURN_PORT: ${TURN_PORT:-3478}
      TURN_TLS_PORT: ${TURN_TLS_PORT:-5349}
      TURN_TLS_ENABLED: ${TURN_TLS_ENABLED:-false}
      # Google Sign-In — the API verifies ID tokens against these audiences.
      # Without them /auth/google returns 503 "Google Sign-In is not configured".
      # These are public OAuth client IDs (shipped in the app), not secrets.
      GOOGLE_CLIENT_ID_WEB: ${GOOGLE_CLIENT_ID_WEB:-}
      GOOGLE_CLIENT_ID_ANDROID: ${GOOGLE_CLIENT_ID_ANDROID:-}
      GOOGLE_CLIENT_ID_IOS: ${GOOGLE_CLIENT_ID_IOS:-}
      # Object storage for profile photos (presigned uploads).
      STORAGE_BUCKET: ${STORAGE_BUCKET:-vybeon-media}
      STORAGE_REGION: ${STORAGE_REGION:-ap-south-1}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      STORAGE_USE_INSTANCE_ROLE: ${STORAGE_USE_INSTANCE_ROLE:-false}
      STORAGE_CDN_URL: ${STORAGE_CDN_URL:-https://cdn.vybeon.com}
    # Loopback only — public traffic arrives via nginx (:80), which reaches the
    # API as api:4000 over the compose network, not through this host port.
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vybeon-network
    healthcheck:
      # Use 127.0.0.1, NOT localhost: inside the container `localhost` resolves
      # to ::1 first and the API binds IPv4 only, so the check would always fail
      # and nginx (depends_on: service_healthy) would never start.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── coturn (WebRTC TURN/STUN) ─────────────────────────────────────────────
  # Uses host networking so it can advertise the real public IP and open the
  # UDP relay port range. Set TURN_SECRET + TURN_EXTERNAL_IP in your .env.
  coturn:
    image: coturn/coturn:4.6
    container_name: vybeon_coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      # TLS certs for turns:// (mount your fullchain + privkey):
      # - ./certs:/etc/coturn/certs:ro
    # TURN_PRIVATE_IP = the host's primary NIC address (`hostname -I | awk '{print $1}'`).
    # On a NAT'd cloud host (EC2/GCP) this differs from the public IP, and coturn
    # must be told the mapping as PUBLIC/PRIVATE — otherwise it advertises the
    # private address in ICE candidates and relayed calls fail. Pinning
    # listening/relay IP also stops it binding the docker bridge interfaces.
    # On a non-NAT VPS set TURN_PRIVATE_IP to the same value as TURN_EXTERNAL_IP.
    command: >
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_SECRET:-change-me}
      --realm=${TURN_REALM:-vybeon}
      --listening-ip=${TURN_PRIVATE_IP}
      --relay-ip=${TURN_PRIVATE_IP}
      --external-ip=${TURN_EXTERNAL_IP}/${TURN_PRIVATE_IP}

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vybeon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certs when available:
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vybeon-network
